name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pharmacy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173
      # RLS runtime role (created by the rls_location_isolation migration) — CI-only creds.
      DATABASE_URL: postgresql://pharmacy_app:pharmacy_app_dev_pw@localhost:5432/pharmacy?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/pharmacy?schema=public
      JWT_ACCESS_SECRET: ci-only-access-secret-not-used-anywhere-else
      JWT_REFRESH_SECRET: ci-only-refresh-secret-not-used-anywhere-else
      FIELD_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run typecheck

      # DB-independent unit suite first — fails fast before touching Postgres.
      - run: npm test

      # Migrations create the schema, RLS policies, and the least-privilege
      # pharmacy_app role; seed (superuser) then loads the permission matrix +
      # demo data the integration suite exercises.
      - run: npx prisma migrate deploy
      - run: npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pharmacy?schema=public

      - run: npm run test:integration

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npx tsc -b
      - run: npm run build
